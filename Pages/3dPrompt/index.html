<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>3D Muse | 3D Modeling Prompt Generator</title>
    <style>
        :root {
            --accent: #6c8eff;
            --bg-dark: #04060c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(ellipse at 20% 30%, #0e121f, var(--bg-dark));
            color: #eef2ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            overflow-x: hidden;
        }

        /* Background Effects */
        .bg-glow {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -2;
        }

            .bg-glow::before, .bg-glow::after {
                content: "";
                position: absolute;
                width: 70vmax;
                height: 70vmax;
                border-radius: 50%;
                opacity: 0.15;
                filter: blur(100px);
                animation: float 30s infinite alternate ease-in-out;
            }

            .bg-glow::before {
                top: -20%;
                left: -15%;
                background: #6c8eff;
            }

            .bg-glow::after {
                bottom: -25%;
                right: -10%;
                background: #b77aff;
            }

        @keyframes float {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(5%, 8%);
            }
        }

        /* Main Container */
        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(12, 16, 28, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2rem;
            border: 1px solid rgba(108, 142, 255, 0.2);
            padding: 2rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(108, 142, 255, 0.1);
            padding-bottom: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, #9bbaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(108, 142, 255, 0.1);
            padding: 0.4rem 0.8rem;
            border-radius: 1rem;
            border: 1px solid rgba(108, 142, 255, 0.2);
        }

        /* Result Area */
        .prompt-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(108, 142, 255, 0.1);
        }

        .prompt-text {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            transition: opacity 0.18s, transform 0.18s;
            min-height: 2.2em;
        }

            .prompt-text.swap {
                opacity: 0;
                transform: translateY(6px);
            }

        .prompt-detail {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
        }

        .tag {
            font-size: 0.75rem;
            background: rgba(255,255,255,0.05);
            padding: 0.3rem 0.7rem;
            border-radius: 0.5rem;
            color: #94a3b8;
            cursor: pointer;
            border: 1px solid transparent;
            transition: border-color 0.15s, background 0.15s;
            user-select: none;
        }

            .tag:hover {
                background: rgba(108, 142, 255, 0.12);
                border-color: rgba(108, 142, 255, 0.35);
            }

            .tag strong {
                color: #fff;
            }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(150%);
            background: rgba(79, 70, 229, 0.95);
            color: #fff;
            padding: 0.7rem 1.4rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
            z-index: 10;
            pointer-events: none;
        }

            .toast.show {
                transform: translateX(-50%) translateY(0);
            }

        /* Controls */
        .toggles {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .toggle-btn {
            background: transparent;
            border: 1px solid rgba(108, 142, 255, 0.2);
            color: #94a3b8;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

            .toggle-btn.active {
                background: rgba(108, 142, 255, 0.2);
                border-color: #6c8eff;
                color: #fff;
            }

        .generate-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 1rem;
            border: none;
            background: #4f46e5;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 1rem;
        }

            .generate-btn:hover {
                background: #4338ca;
            }

        .secondary-group {
            display: flex;
            gap: 1rem;
        }

        .btn-small {
            flex: 1;
            padding: 0.7rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #cbd5e1;
            cursor: pointer;
        }

            .btn-small:hover {
                background: rgba(255,255,255,0.1);
            }

        .combo-count {
            font-size: 0.72rem;
            color: #6c8eff;
            margin-top: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

            .combo-count strong {
                color: #9bbaff;
            }

        /* History */
        .history {
            margin-top: 1.5rem;
            border-top: 1px solid rgba(108, 142, 255, 0.1);
            padding-top: 1rem;
        }

        .history-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #64748b;
            font-weight: 600;
            margin-bottom: 0.6rem;
        }

        .history-clear {
            background: none;
            border: none;
            color: #64748b;
            font-size: 0.7rem;
            cursor: pointer;
            letter-spacing: 1px;
        }

            .history-clear:hover {
                color: #94a3b8;
            }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .history-item {
            font-size: 0.8rem;
            color: #94a3b8;
            background: rgba(255,255,255,0.03);
            padding: 0.5rem 0.8rem;
            border-radius: 0.6rem;
            cursor: pointer;
            border: 1px solid transparent;
            transition: border-color 0.15s, color 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

            .history-item:hover {
                color: #eef2ff;
                border-color: rgba(108, 142, 255, 0.3);
            }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="header">
            <h1>3D Muse</h1>
            <div class="badge">Prompt Generator</div>
        </div>

        <div class="prompt-card">
            <div class="prompt-text" id="promptBox">Click generate to start</div>
            <div class="prompt-detail" id="tagBox"></div>
            <div style="font-size: 0.7rem; color: #475569; margin-top: 1rem;">Tip: click any tag to re-roll just that part. Press Space to generate.</div>
            <div class="combo-count" id="comboCount"></div>
        </div>

        <div style="font-size: 0.8rem; margin-bottom: 0.8rem; color: #64748b; font-weight: 600;">INCLUDE ELEMENTS:</div>
        <div class="toggles">
            <button class="toggle-btn active" data-cat="subject">Subject</button>
            <button class="toggle-btn active" data-cat="object">Object</button>
            <button class="toggle-btn active" data-cat="style">Style</button>
            <button class="toggle-btn active" data-cat="era">Era</button>
            <button class="toggle-btn active" data-cat="flavor">Flavor</button>
            <button class="toggle-btn active" data-cat="lighting">Lighting</button>
            <button class="toggle-btn active" data-cat="palette">Palette</button>
        </div>

        <button class="generate-btn" id="genBtn">GENERATE PROMPT</button>

        <div class="secondary-group">
            <button class="btn-small" id="copyBtn">Copy Text</button>
            <button class="btn-small" id="refreshBtn">Randomize All</button>
        </div>

        <div class="history" id="history" hidden>
            <div class="history-head">
                <span>RECENT</span>
                <button id="clearHist" class="history-clear">Clear</button>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="data.js"></script>
    <script>
        // Order drives the rendered sentence + tag order. Standard ASCII only.
        const CATS = ["subject", "object", "style", "era", "flavor", "lighting", "palette"];

        // Word banks live in data.js (window.MUSE_DATA). Inline fallback keeps the
        // page usable if that file fails to load.
        const data = window.MUSE_DATA || {
            subject: ["Ancient warrior", "Cybernetic being", "Mystic creature"],
            object: ["Holocron", "Plasma rifle", "Battle tank"],
            style: ["Art Deco", "Cyberpunk", "Steampunk"],
            era: ["Bronze Age", "Year 3000", "Post-apocalyptic"],
            flavor: ["glowing runes", "weathered metal", "ice crystals"],
            lighting: ["dramatic rim light", "moonlit shadows", "harsh neon glow"],
            palette: ["muted earth tones", "vibrant neon", "monochrome"]
        };

        // Sentence connector per category. The FIRST active part drops its prefix
        // (see render) so wording stays clean no matter which filters are off.
        const PREFIX = { subject: "", object: "with ", style: "in ", era: "from ", flavor: "featuring ", lighting: "lit by ", palette: "in a " };
        const SUFFIX = { style: " style", palette: " palette" };

        const SAVE_KEY = "muse3d.active";
        const HIST_KEY = "muse3d.history";
        const SEP = " · "; // middle dot

        let active = loadActive();
        let current = blankState();
        let history = loadHistory();

        function blankState() {
            const s = {};
            CATS.forEach(c => s[c] = "");
            return s;
        }

        function loadActive() {
            const def = {};
            CATS.forEach(c => def[c] = true);
            try {
                const saved = JSON.parse(localStorage.getItem(SAVE_KEY));
                if (saved) return Object.assign(def, saved);
            } catch (e) { /* ignore corrupt storage */ }
            return def;
        }

        function saveActive() {
            try { localStorage.setItem(SAVE_KEY, JSON.stringify(active)); } catch (e) {}
        }

        function getRandom(cat) {
            const list = data[cat];
            let pick = list[Math.floor(Math.random() * list.length)];
            // Avoid repeating the same value back-to-back when possible.
            if (list.length > 1 && pick === current[cat]) {
                pick = list[(list.indexOf(pick) + 1) % list.length];
            }
            return pick;
        }

        const promptBox = document.getElementById('promptBox');
        const tagBox = document.getElementById('tagBox');
        const comboCount = document.getElementById('comboCount');

        // Total unique prompts = product of bank sizes for the active categories.
        function updateCombos() {
            const activeCats = CATS.filter(c => active[c]);
            if (!activeCats.length) { comboCount.textContent = ""; return; }
            const total = activeCats.reduce((n, c) => n * data[c].length, 1);
            comboCount.innerHTML = `<strong>${total.toLocaleString()}</strong> possible prompts from your current filters`;
        }

        function render() {
            const parts = [];
            const tags = [];
            let first = true;

            CATS.forEach(cat => {
                if (!active[cat]) return;
                const val = current[cat];
                // First active part drops its connecting preposition so the
                // sentence reads naturally whatever combination is enabled.
                const prefix = first ? "" : (PREFIX[cat] || "");
                parts.push(prefix + val + (SUFFIX[cat] || ""));
                tags.push(`<div class="tag" data-cat="${cat}" title="Click to re-roll">${cat}: <strong>${val}</strong></div>`);
                first = false;
            });

            if (parts.length === 0) {
                promptBox.innerText = "Select at least one element.";
                tagBox.innerHTML = "";
                updateCombos();
                return;
            }
            const str = parts.join(SEP);
            promptBox.innerText = str.charAt(0).toUpperCase() + str.slice(1);
            tagBox.innerHTML = tags.join("");
            updateCombos();
        }

        // Brief fade/slide on prompt change.
        function animateSwap(mutate) {
            promptBox.classList.add('swap');
            setTimeout(() => {
                mutate();
                promptBox.classList.remove('swap');
            }, 150);
        }

        function randomize() {
            animateSwap(() => {
                CATS.forEach(k => current[k] = getRandom(k));
                render();
                pushHistory();
            });
        }

        // ---- History ----
        function loadHistory() {
            try {
                const h = JSON.parse(localStorage.getItem(HIST_KEY));
                if (Array.isArray(h)) return h;
            } catch (e) {}
            return [];
        }

        function saveHistory() {
            try { localStorage.setItem(HIST_KEY, JSON.stringify(history)); } catch (e) {}
        }

        function pushHistory() {
            const text = promptBox.innerText;
            if (!text || history[0] && history[0].text === text) return;
            history.unshift({ text, state: Object.assign({}, current), active: Object.assign({}, active) });
            history = history.slice(0, 8);
            saveHistory();
            renderHistory();
        }

        function renderHistory() {
            const wrap = document.getElementById('history');
            const list = document.getElementById('historyList');
            if (!history.length) { wrap.hidden = true; return; }
            wrap.hidden = false;
            list.innerHTML = history
                .map((h, i) => `<div class="history-item" data-i="${i}" title="${h.text}">${h.text}</div>`)
                .join("");
        }

        function restore(i) {
            const h = history[i];
            if (!h) return;
            current = Object.assign(blankState(), h.state);
            active = Object.assign({}, active, h.active);
            // Sync toggle buttons to restored state.
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.classList.toggle('active', !!active[btn.dataset.cat]);
            });
            saveActive();
            animateSwap(render);
        }

        let toastTimer;
        function toast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove('show'), 1600);
        }

        async function copyPrompt() {
            const text = promptBox.innerText;
            try {
                await navigator.clipboard.writeText(text);
            } catch (e) {
                // Fallback for non-secure contexts / older browsers.
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); } catch (e2) {}
                document.body.removeChild(ta);
            }
            toast("Copied to clipboard");
        }

        document.getElementById('genBtn').onclick = randomize;
        document.getElementById('refreshBtn').onclick = randomize;
        document.getElementById('copyBtn').onclick = copyPrompt;

        // Per-tag re-roll.
        tagBox.onclick = (e) => {
            const tag = e.target.closest('.tag');
            if (!tag) return;
            const cat = tag.dataset.cat;
            current[cat] = getRandom(cat);
            render();
        };

        document.querySelectorAll('.toggle-btn').forEach(btn => {
            const cat = btn.dataset.cat;
            btn.classList.toggle('active', active[cat]);
            btn.onclick = () => {
                active[cat] = !active[cat];
                btn.classList.toggle('active', active[cat]);
                if (active[cat] && !current[cat]) current[cat] = getRandom(cat);
                saveActive();
                render();
            };
        });

        // History list: click an entry to restore it.
        document.getElementById('historyList').onclick = (e) => {
            const item = e.target.closest('.history-item');
            if (item) restore(+item.dataset.i);
        };

        document.getElementById('clearHist').onclick = () => {
            history = [];
            saveHistory();
            renderHistory();
        };

        // Space / Enter generates (unless typing in a field).
        document.addEventListener('keydown', (e) => {
            if ((e.code === 'Space' || e.code === 'Enter') && e.target.tagName !== 'BUTTON') {
                e.preventDefault();
                randomize();
            }
        });

        // Start
        renderHistory();
        randomize();
    </script>
</body>
</html>
