<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>iCloud Gallery</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0B0B0B;
            --surface: #141414;
            --surface2: #1C1C1C;
            --border: #242424;
            --border2: #303030;
            --text: #F0F0F0;
            --muted: #5A5A5A;
            --muted2: #888;
            --accent: #FF6B35;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Space Grotesk', system-ui, sans-serif;
        }

        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 14px;
            line-height: 1.5;
        }

        /* ───────── HEADER ───────── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-mark {
            width: 24px;
            height: 24px;
            background: var(--accent);
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 2px;
            padding: 4px;
        }

            .logo-mark span {
                background: #000;
            }

        .logo-label {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
        }

            .logo-label b {
                color: var(--text);
            }

        .header-album {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted2);
        }

        /* ───────── BAR ───────── */
        .album-bar {
            display: flex;
            padding: 16px 24px;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        .album-prefix {
            font-family: var(--mono);
            font-size: 12px;
            padding: 0 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
        }

        .album-input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0 12px;
            font-family: var(--mono);
            outline: none;
        }

            .album-input:focus {
                border-color: var(--accent);
            }

        .album-load-btn {
            background: var(--accent);
            color: #000;
            padding: 0 18px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* ───────── STATUS ───────── */
        .status {
            padding: 8px 24px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted2);
            border-bottom: 1px solid var(--border);
        }

            .status.hidden {
                display: none;
            }

        /* ───────── GRID ───────── */
        .content {
            padding: 24px;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 3px;
        }

        .photo-tile {
            aspect-ratio: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

            .photo-tile img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transition: transform .3s;
            }

            .photo-tile:hover img {
                transform: scale(1.05);
            }

        /* ───────── EMPTY ───────── */
        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
            text-align: center;
        }

            .empty h2 {
                margin-top: 12px;
            }

            .empty p {
                color: var(--muted2);
                font-size: 12px;
            }

        /* ───────── LIGHTBOX ───────── */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.95);
            display: none;
            align-items: center;
            justify-content: center;
        }

            .lightbox.open {
                display: flex;
            }

        .lb-img {
            max-width: 90vw;
            max-height: 80vh;
        }

        .lb-close {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 24px;
            color: white;
            background: none;
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="logo">
            <div class="logo-mark"><span></span><span></span><span></span><span></span></div>
            <div class="logo-label"><b>ICLOUD</b> gallery</div>
        </div>
        <div id="headerAlbum" class="header-album"></div>
    </header>

    <div class="album-bar">
        <div class="album-prefix">icloud.com/sharedalbum/#</div>
        <input id="albumInput" class="album-input" placeholder="album token">
        <button class="album-load-btn" id="loadBtn">Load</button>
    </div>

    <div id="status" class="status hidden"></div>

    <div class="content" id="content"></div>

    <div class="lightbox" id="lightbox" onclick="closeLb()">
        <button class="lb-close" onclick="closeLb()">×</button>
        <img id="lbImg" class="lb-img">
    </div>

    <script>
        const DEFAULT_TOKEN = "B2AGWZuqDJuqLk2";
        const S = { gallery: [], lbIdx: 0 };

        /* ───────── DEBUG FETCH ───────── */
        async function iPost(partition, token, endpoint, body) {
            const url = `https://${partition}-sharedstreams.icloud.com/${token}/sharedstreams/${endpoint}`;
            console.log("Request URL:", url);

            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });

            let data;
            try { data = await res.json(); }
            catch { data = {}; }

            if (!res.ok) throw new Error("HTTP " + res.status);
            return data;
        }

        async function loadAlbum() {
            const token = document.getElementById("albumInput").value.trim();

            if (!token) return;

            document.getElementById("status").classList.remove("hidden");
            document.getElementById("status").innerText = "Loading...";

            try {
                const ws = await iPost("p00", token, "webstream", { streamCtag: null });

                const photos = (ws.photos || []).filter(p => p.mediaAssetType !== "video");

                S.gallery = photos;

                document.getElementById("headerAlbum").innerText = ws.streamName || "Album";

                render();

                document.getElementById("status").innerText =
                    `Loaded ${photos.length} photos`;

            } catch (e) {
                document.getElementById("status").innerText = e.message;
            }
        }

        function render() {
            const el = document.getElementById("content");

            if (!S.gallery.length) {
                el.innerHTML = "<div class='empty'><h2>No photos</h2></div>";
                return;
            }

            el.innerHTML = `
            <div class="photo-grid">
                ${S.gallery.map((p, i) => `
                    <div class="photo-tile" onclick="openLb(${i})">
                        <img src="" alt="">
                    </div>
                `).join("")}
            </div>
        `;
        }

        function openLb(i) {
            S.lbIdx = i;
            document.getElementById("lbImg").src = "";
            document.getElementById("lightbox").classList.add("open");
        }

        function closeLb() {
            document.getElementById("lightbox").classList.remove("open");
        }

        document.getElementById("loadBtn").onclick = loadAlbum;
        document.getElementById("albumInput").value = DEFAULT_TOKEN;
        loadAlbum();
    </script>

</body>
</html>
