        <section class="hero-section">

                <p>Explore 3D artwork, tools, and experiments.</p>
                <span class="hero-badge">Live from Sketchfab</span>
            </div>
        </section>

            <div class="section-header">
                <h2 id="portfolio-title" class="section-title">Featured Projects</h2>
                <span id="modelStats" class="model-stats">Loading…</span>
            </div>

                <button class="filter-btn" type="button" data-sort="views">👁 Views</button>

                <button class="filter-btn active" type="button" data-sort="date">🕒 New</button>
                <button class="filter-btn" type="button" data-sort="reset">⟳ Reset</button>

            <div class="grid" id="projectGrid"></div>
